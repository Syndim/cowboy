    <tspan x="18" dy="18"><tspan fill="#3b4261">│</tspan><tspan fill="#ffffff">  &gt; add a /healthz route</tspan><tspan fill="#3b4261">                                                                          │</tspan></tspan>
    <tspan x="18" dy="18"><tspan fill="#3b4261">│</tspan><tspan fill="#ffffff">  &gt; /run investigate failing tests</tspan><tspan fill="#3b4261">                                                                │</tspan></tspan>
