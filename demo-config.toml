# Demo Cowboy config for running from the project root.
# Use with: cargo run -p cowboy -- --config demo-config.toml <command>

state_dir = ".cowboy/demo-state"
workflow_store = ".cowboy/demo-state/data.db"
workflow_dirs = ["crates/workflow/engine/test_files"]
mouse_scroll_lines = 3

[config_sets.default]
max_steps_per_run = 100
max_visits_per_step = 20
max_retries_per_run = 200
max_retries_per_step = 2

[config_sets.careful]
# Omitted step/visit fields inherit 100 and 20.
max_retries_per_run = 20
max_retries_per_step = 4

[[agents]]
name = "default"
# Switch to "copilot" + ["--acp"] if you prefer GitHub Copilot's ACP backend.
command = "omp"
args = ["--thinking=auto", "acp"]

[agents.model]
id = "opus-4.8-1m"
provider = "github-copilot"

# Agent inactivity resets on every parsed ACP message. Recovery sends session/cancel,
# then "Continue"; if cancellation stalls, Cowboy kills the recorded PID,
# restarts with --resume=<session-id>, and sends "Continue" again.
[agents.watchdog]
response_timeout_seconds = 100
cancel_timeout_seconds = 10
recovery_operation_timeout_seconds = 30

[[agents]]
name = "planner"
command = "omp"
args = ["--model=github-copilot/claude-opus-4.8", "--thinking=xhigh", "acp"]

[[agents]]
name = "reviewer"
command = "omp"
args = ["--model=github-copilot/gpt-5.6-sol", "--thinking=high", "acp"]

[[agents]]
name = "implementer"
command = "omp"
args = ["--model=github-copilot/claude-opus-4.8", "--thinking=medium", "acp"]

[[agents]]
name = "tester"
command = "omp"
args = ["--model=github-copilot/claude-sonnet-5", "--thinking=medium", "acp"]

[[agents]]
name = "committer"
command = "omp"
args = ["--model=github-copilot/claude-haiku-4.5", "--thinking=low", "acp"]
